#cloud-config
package_update: true
packages:
  - python3
  - python3-venv
  - python3-pip

write_files:
  - path: /opt/app/app.py
    permissions: "0644"
    content: |
      ${indent(6, app_py)}

  - path: /opt/app/db.py
    permissions: "0644"
    content: |
      ${indent(6, db_py)}

  - path: /opt/app/requirements.txt
    permissions: "0644"
    content: |
      ${indent(6, requirements_txt)}

  - path: /etc/flaskapp.env
    permissions: "0644"
    content: |
      FLASK_ENV=production
      APP_HOST=0.0.0.0
      APP_PORT=5000
      DB_HOST=${db_host}
      DB_PORT=5432
      DB_NAME=${db_name}
      DB_USER=${db_user}
      DB_PASS=${db_password}
      DB_SSLMODE=${db_sslmode}

  - path: /etc/systemd/system/flaskapp.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Flask App
      After=network-online.target
      Wants=network-online.target

      [Service]
      WorkingDirectory=/opt/app
      EnvironmentFile=/etc/flaskapp.env
      ExecStart=/opt/app/.venv/bin/python /opt/app/app.py
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

runcmd:
  - mkdir -p /opt/app
  - python3 -m venv /opt/app/.venv
  - /opt/app/.venv/bin/pip install --upgrade pip
  - /opt/app/.venv/bin/pip install -r /opt/app/requirements.txt
  - systemctl daemon-reload
  - systemctl enable flaskapp
  - systemctl restart flaskapp
